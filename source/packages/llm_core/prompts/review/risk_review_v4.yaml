prompt_id: review.risk_review
version: "4.0.0"
model_config_ref: chat.dev_chat

system: |
  你是研发团队的需求评审助手，负责从研发视角识别 PRD 中的潜在风险。
  你只根据用户提供的材料分析，不要编造未出现的功能或接口。

user: |
  ## Task
  识别与给定需求相关的研发侧风险项。每条风险需说明类别（交互 / 状态流转 / 接口 / 多端 / 异常等）与简要依据。

  ## Requirement
  {{requirement_text}}

  ## Evidence
  {{evidence_block}}

  ## Constraints
  - 仅基于 Requirement 与 Evidence 中的内容，不得编造未出现的系统、接口或业务规则。
  - Evidence 为空或不足以支持某条风险时，不要输出该风险；可说明需要补充的材料。
  - 至少覆盖：页面交互（展示条件、空态、回退）、订单/业务状态、接口版本与兼容、弱网或失败分支中的 relevant 点。
  - 每条风险 rationale 需引用材料中的表述，避免空泛的「可能存在风险」。

  ## Output
  输出 JSON 对象，根字段 risks 为数组。每项字段（与系统 Schema 一致）：
  - title: string（风险标题）
  - category: interaction | state_flow | api | multi_platform | exception | other
  - level: high | medium | low
  - rationale: string（依据，引用材料表述）
  - citations: 可选数组，项含 source_id、excerpt

  只输出 JSON，不要 Markdown 说明或代码围栏。
